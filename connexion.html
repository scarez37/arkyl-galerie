<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Artiste - ARKYL</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 50%, #1a1a1a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            animation: slideIn 0.5s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            text-align: center;
            margin-bottom: 10px;
        }
        
        .logo h1 {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #d4a574, #c49565);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
        }
        
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-weight: 400;
            font-size: 18px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-size: 14px;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        input:focus {
            outline: none;
            border-color: #d4a574;
            box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.1);
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #d4a574, #c49565);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 165, 116, 0.3);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 165, 116, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-msg {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            margin-top: 15px;
            display: none;
            border: 1px solid #fcc;
        }
        
        .success-msg {
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            margin-top: 15px;
            display: none;
            border: 1px solid #cfc;
        }
        
        .links {
            text-align: center;
            margin-top: 20px;
        }
        
        .link {
            color: #666;
            font-size: 14px;
            text-decoration: none;
            display: block;
            margin-top: 10px;
        }
        
        .link-primary {
            color: #d4a574;
            font-weight: 600;
        }
        
        .link:hover {
            text-decoration: underline;
        }
        
        .divider {
            text-align: center;
            margin: 20px 0;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <div class="logo">
        <h1>ARKYL</h1>
    </div>
    <h2>Bon retour parmi nous 👋</h2>
    
    <form id="loginForm">
        <div class="form-group">
            <label>Email *</label>
            <input type="email" id="email" required placeholder="votre.email@exemple.com" autocomplete="email">
        </div>
        
        <div class="form-group">
            <label>Mot de passe *</label>
            <input type="password" id="password" required placeholder="Votre mot de passe" autocomplete="current-password">
        </div>
        
        <button type="submit" id="btnSubmit">Se connecter</button>
        
        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>
    </form>
    
    <div class="divider">───── ou ─────</div>
    
    <div class="links">
        <a href="inscription.html" class="link link-primary">Créer un nouveau compte</a>
        <a href="index.html" class="link">Retour à la galerie</a>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('btnSubmit');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        
        // Réinitialiser les messages
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';
        
        // Désactiver le bouton
        btn.textContent = "🔐 Vérification...";
        btn.disabled = true;

        const data = {
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value
        };
        
        console.log('🔑 Tentative de connexion pour:', data.email);

        try {
            const response = await fetch('https://arkyl-galerie.onrender.com/api_connexion.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const responseText = await response.text();
            console.log('📥 Réponse brute:', responseText);
            
            let result;
            try {
                result = JSON.parse(responseText);
            } catch (parseError) {
                console.error('❌ Erreur parsing:', parseError);
                throw new Error('Réponse serveur invalide');
            }
            
            console.log('📥 Réponse parsée:', result);

            if (result.success) {
                // Logger tous les champs retournés par l'API pour debug
                console.log('📦 Champs retournés par api_connexion.php:', Object.keys(result));
                console.log('📦 result complet:', JSON.stringify(result));

                // ⭐ FIX : Forcer en String pour éviter les comparaisons === ratées (PHP retourne des int)
                const userId   = String(result.user_id   || result.id        || result.artist_id || result.userId || '');
                const userName = result.user_name  || result.name      || result.username  || result.artist_name;
                const userEmail= result.user_email || result.email     || result.user_mail;

                if (!userId) {
                    console.error('❌ Aucun user_id retourné par le serveur !', result);
                    errorMsg.textContent = "❌ Erreur serveur : identifiant manquant.";
                    errorMsg.style.display = 'block';
                    btn.textContent = "Se connecter";
                    btn.disabled = false;
                    return;
                }

                // Compte artiste — structure attendue par app.js
                const artistAccount = {
                    id:      String(userId),
                    name:    userName,
                    email:   userEmail,
                    country: result.country || 'Côte d\'Ivoire',
                    avatar:  result.avatar  || '',
                    artistName: result.artist_name || userName,
                    role:    result.role    || 'artist',
                    isArtist: true
                };

                // currentUser — structure attendue par app.js
                // ⭐ FIX : id et googleId toujours en String (évite === raté avec entiers PHP)
                const currentUser = {
                    id:        String(userId),
                    googleId:  String(userId),
                    email:     userEmail,
                    name:      userName,
                    picture:   result.avatar || '',
                    isArtist:  true,
                    artistName: result.artist_name || userName,
                    isAdmin:   result.role === 'admin'
                };

                // ── Sauvegarder sous TOUTES les clés attendues ──
                // 1. Clé par ID (clé principale de app.js)
                localStorage.setItem(
                    `arkyl_artist_account_${userId}`,
                    JSON.stringify(artistAccount)
                );
                // 2. Clé par email (fallback de app.js)
                localStorage.setItem(
                    `arkyl_artist_account_email_${userEmail.toLowerCase()}`,
                    JSON.stringify(artistAccount)
                );
                // 3. currentUser (pour restoreSession dans app.js)
                localStorage.setItem('arkyl_current_user', JSON.stringify(currentUser));
                
                // 4. 🔐 Clés simples attendues par artist_dashboard.html
                localStorage.setItem('user_id', String(userId));
                localStorage.setItem('user_name', userName);
                localStorage.setItem('user_email', userEmail);

                console.log('✅ Connexion réussie! ID:', userId);
                console.log('✅ Clés sauvegardées:', `arkyl_artist_account_${userId}`);

                successMsg.textContent = "✅ " + result.message + " Redirection vers votre espace artiste...";
                successMsg.style.display = 'block';

                setTimeout(() => {
                    window.location.href = 'artist_dashboard.html';
                }, 1500);
                
            } else {
                errorMsg.textContent = "❌ " + result.message;
                errorMsg.style.display = 'block';
                btn.textContent = "Se connecter";
                btn.disabled = false;
                
                console.error('❌ Échec connexion:', result.message);
            }
        } catch (erreur) {
            errorMsg.textContent = "❌ Erreur de connexion au serveur. Vérifiez votre connexion internet.";
            errorMsg.style.display = 'block';
            btn.textContent = "Se connecter";
            btn.disabled = false;
            
            console.error('❌ Erreur technique:', erreur);
        }
    });
</script>

</body>
</html>
