<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnostic PWA - ARKYL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            font-family: 'Poppins', sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #d4af37;
            margin-bottom: 30px;
            text-align: center;
        }
        .check {
            background: rgba(212, 175, 55, 0.1);
            border-left: 4px solid #d4af37;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }
        .check.success { border-left-color: #4caf50; background: rgba(76, 175, 80, 0.1); }
        .check.error { border-left-color: #f44336; background: rgba(244, 67, 54, 0.1); }
        .check.warning { border-left-color: #ff9800; background: rgba(255, 152, 0, 0.1); }
        .check-title {
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .check-status {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .check-text {
            font-size: 13px;
            opacity: 0.9;
            line-height: 1.5;
        }
        .code {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 11px;
            margin-top: 8px;
            word-break: break-all;
        }
        .button {
            display: inline-block;
            padding: 12px 24px;
            background: #d4af37;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            font-size: 14px;
        }
        .button:hover { background: #e8c547; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Diagnostic PWA - ARKYL</h1>
        
        <div id="diagnosticResults"></div>
        
        <div style="text-align: center; margin-top: 30px;">
            <button class="button" onclick="location.reload()">Rafraîchir le diagnostic</button>
        </div>
    </div>

    <script>
        async function runDiagnostics() {
            const results = [];

            // 1. HTTPS Check
            const isHTTPS = location.protocol === 'https:';
            results.push({
                title: '🔐 HTTPS (Obligatoire)',
                status: isHTTPS ? 'success' : 'error',
                text: isHTTPS 
                    ? '✅ Site en HTTPS - PWA autorisée'
                    : '❌ Site en HTTP - PWA BLOQUÉE ! Doit être en HTTPS',
                details: `Protocole: ${location.protocol}`
            });

            // 2. Manifest Check
            let manifestOK = false;
            try {
                const manifest = await fetch('/manifest.json');
                manifestOK = manifest.ok;
                const data = await manifest.json();
                results.push({
                    title: '📋 Manifest.json',
                    status: manifestOK && data.name ? 'success' : 'error',
                    text: manifestOK && data.name 
                        ? '✅ Manifest chargé correctement'
                        : '❌ Manifest invalide ou manquant',
                    details: manifestOK ? `Nom: ${data.name}` : 'Erreur de chargement'
                });
            } catch (e) {
                results.push({
                    title: '📋 Manifest.json',
                    status: 'error',
                    text: '❌ Impossible de charger le manifest',
                    details: e.message
                });
            }

            // 3. Service Worker Check
            let swOK = false;
            let swStatus = '⏳ Vérification...';
            if ('serviceWorker' in navigator) {
                try {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    swOK = registrations.length > 0;
                    swStatus = swOK ? '✅ Service Worker enregistré et actif' : '⏳ Service Worker pas encore activé';
                    if (swOK) {
                        swStatus += ` (${registrations[0].scope})`;
                    }
                } catch (e) {
                    swStatus = '❌ Erreur Service Worker: ' + e.message;
                }
            } else {
                swStatus = '❌ Service Worker non supporté par ce navigateur';
            }
            results.push({
                title: '⚙️ Service Worker',
                status: swOK ? 'success' : 'warning',
                text: swStatus,
                details: 'Le Service Worker permet l\'installation et le fonctionnement hors ligne'
            });

            // 4. Icons Check
            const iconSizes = ['32', '192', '512'];
            let iconsOK = true;
            for (const size of iconSizes) {
                try {
                    const response = await fetch(`/favicon-${size}.png`);
                    if (!response.ok) iconsOK = false;
                } catch {
                    iconsOK = false;
                }
            }
            results.push({
                title: '🖼️ Icônes (favicon-32.png, favicon-192.png, logo-512.png)',
                status: iconsOK ? 'success' : 'error',
                text: iconsOK 
                    ? '✅ Toutes les icônes sont présentes'
                    : '❌ Une ou plusieurs icônes manquent',
                details: 'Les icônes sont nécessaires pour l\'affichage sur l\'écran d\'accueil'
            });

            // 5. Installability Check
            let installable = false;
            if (isHTTPS && manifestOK && swOK && iconsOK) {
                installable = true;
            }
            results.push({
                title: '✨ Statut d\'Installabilité',
                status: installable ? 'success' : 'error',
                text: installable 
                    ? '✅ APP PRÊTE À ÊTRE INSTALLÉE ! 🎉'
                    : '❌ L\'app n\'est pas encore prête à être installée',
                details: installable 
                    ? 'Tous les critères PWA sont remplis'
                    : 'Veuillez corriger les erreurs ci-dessus'
            });

            // 6. Network Check
            if (navigator.connection) {
                results.push({
                    title: '🌐 Connexion Réseau',
                    status: 'warning',
                    text: `Type: ${navigator.connection.effectiveType}`,
                    details: `Assurer une bonne connexion réseau pour l'installation`
                });
            }

            // Render results
            const container = document.getElementById('diagnosticResults');
            container.innerHTML = results.map(r => `
                <div class="check ${r.status}">
                    <div class="check-title">${r.title}</div>
                    <div class="check-status">${r.text}</div>
                    ${r.details ? `<div class="check-text">${r.details}</div>` : ''}
                </div>
            `).join('');

            // Final instructions
            if (installable) {
                container.innerHTML += `
                    <div class="check success" style="margin-top: 30px;">
                        <div class="check-title">📱 Instructions d'Installation (Android)</div>
                        <div class="check-text">
                            1. Ouvrez Chrome sur votre téléphone<br>
                            2. Accédez à https://arkyl.site<br>
                            3. Attendez 5-10 secondes<br>
                            4. Tapez les 3 points en haut à droite<br>
                            5. Cherchez "Installer" ou "Install app"<br>
                            6. Confirmez pour ajouter l'app à l'écran d'accueil
                        </div>
                    </div>
                `;
            }
        }

        // Run on load
        window.addEventListener('load', runDiagnostics);
    </script>
</body>
</html>
